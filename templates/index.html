<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PowerPoint Auto-Generator</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>PowerPoint Auto-Generator</h1>
        <p>Transform your text into professional presentations</p>
      </header>

      <form
        id="generatorForm"
        action="/generate"
        method="post"
        enctype="multipart/form-data"
      >
        <div class="form-group">
          <label for="text_content">Content Text *</label>
          <textarea
            id="text_content"
            name="text_content"
            placeholder="Paste your bulk text, markdown, or prose here..."
            required
          ></textarea>
          <small>Supports plain text and markdown formatting</small>
        </div>

        <div class="form-group">
          <label for="guidance">Guidance (Optional)</label>
          <input
            type="text"
            id="guidance"
            name="guidance"
            placeholder="e.g., 'Professional tone for business presentation' or 'Educational slides for students'"
          />
        </div>

        <div class="form-group">
          <label for="api_key">LLM API Key *</label>
          <input
            type="password"
            id="api_key"
            name="api_key"
            placeholder="Your OpenAI/Anthropic/Gemini API key"
            required
          />
          <small class="security-note"
            >🔒 API key is never stored or logged</small
          >
        </div>

        <div class="form-group">
          <label for="template_file">PowerPoint Template *</label>
          <input
            type="file"
            id="template_file"
            name="template_file"
            accept=".pptx,.potx"
            required
          />
          <small>Upload a .pptx or .potx template file (max 10MB)</small>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">
            Generate Presentation
          </button>
          <button type="reset" class="btn-secondary">Clear Form</button>
        </div>
      </form>

      <div id="result" class="result-section" style="display: none">
        <h3>Generation Result</h3>
        <div id="resultContent"></div>
      </div>
    </div>

    <script>
      document
        .getElementById("generatorForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const submitBtn = document.querySelector(".btn-primary");
          const resultDiv = document.getElementById("result");
          const resultContent = document.getElementById("resultContent");

          // Show loading state
          submitBtn.textContent = "Processing with AI...";
          submitBtn.disabled = true;
          resultDiv.style.display = "block";
          resultContent.innerHTML =
            '<div class="loading">🤖 Processing your content through AI...</div>';

          try {
            const formData = new FormData(this);
            const response = await fetch("/generate", {
              method: "POST",
              body: formData,
            });

            const result = await response.json();

            // Display result
            if (result.detail) {
              // Error response
              resultContent.innerHTML = `<div class="error">❌ ${result.detail}</div>`;
            } else if (result.status === "success") {
              // Success response with download capability
              const stats = result.stats;
              const structure = result.slide_structure;

              let slidesHtml = "";
              structure.slides.forEach((slide, index) => {
                slidesHtml += `
                                <div class="slide-preview">
                                    <h4>Slide ${index + 2}: ${slide.title}</h4>
                                    <ul>
                                        ${slide.content
                                          .map((point) => `<li>${point}</li>`)
                                          .join("")}
                                    </ul>
                                    ${
                                      slide.speaker_notes
                                        ? `<p class="speaker-notes">📝 ${slide.speaker_notes}</p>`
                                        : ""
                                    }
                                </div>
                            `;
              });

              // Check if we have a download URL (Step 3 functionality)
              const downloadSection = result.download_url
                ? `<div class="download-section">
                                <a href="${result.download_url}" class="download-btn" download>
                                    📥 Download PowerPoint Presentation
                                </a>
                                <p class="download-info">Your presentation is ready! Click above to download.</p>
                            </div>`
                : `<div class="next-step">
                                <p>🚧 <strong>Next:</strong> PowerPoint generation will be implemented in Step 3!</p>
                                <p><strong>Session ID:</strong> ${result.session_id}</p>
                            </div>`;

              resultContent.innerHTML = `
                            <div class="success">
                                <h3>✅ ${result.message}</h3>
                                
                                ${downloadSection}
                                
                                <div class="stats">
                                    <h4>Generation Stats:</h4>
                                    <p><strong>Original Text:</strong> ${stats.original_text_length.toLocaleString()} characters</p>
                                    <p><strong>Slides Created:</strong> ${
                                      stats.slides_generated
                                    } ${
                result.download_url ? "(including title slide)" : ""
              }</p>
                                    <p><strong>Template Size:</strong> ${
                                      stats.template_size_mb
                                    } MB</p>
                                    <p><strong>AI Provider:</strong> ${
                                      stats.provider_used
                                    }</p>
                                    ${
                                      stats.template_info &&
                                      stats.template_info.layouts_count
                                        ? `<p><strong>Template Layouts:</strong> ${stats.template_info.layouts_count}</p>`
                                        : ""
                                    }
                                </div>
                                
                                <div class="presentation-preview">
                                    <h4>📊 Generated Presentation: "${
                                      structure.title
                                    }"</h4>
                                    <div class="slide-preview title-slide">
                                        <h4>Slide 1: ${
                                          structure.title
                                        } (Title Slide)</h4>
                                        <p class="slide-type">Generated title slide with subtitle</p>
                                    </div>
                                    ${slidesHtml}
                                </div>
                            </div>
                        `;

              // Auto-scroll to results
              resultDiv.scrollIntoView({ behavior: "smooth" });

              // If download is available, highlight the download button
              if (result.download_url) {
                setTimeout(() => {
                  const downloadBtn = document.querySelector(".download-btn");
                  if (downloadBtn) {
                    downloadBtn.style.animation = "pulse 2s infinite";
                  }
                }, 1000);
              }
            }
          } catch (error) {
            resultContent.innerHTML = `<div class="error">❌ Network Error: ${error.message}</div>`;
          } finally {
            // Reset button
            submitBtn.textContent = "Generate Presentation";
            submitBtn.disabled = false;
          }
        });

      // Form reset handler
      document
        .querySelector(".btn-secondary")
        .addEventListener("click", function () {
          const resultDiv = document.getElementById("result");
          resultDiv.style.display = "none";

          // Clear file input properly
          const fileInput = document.getElementById("template_file");
          fileInput.value = "";

          // Reset form validation states
          document
            .querySelectorAll(".form-group input, .form-group textarea")
            .forEach((field) => {
              field.classList.remove("error");
            });
        });

      // Real-time file validation
      document
        .getElementById("template_file")
        .addEventListener("change", function (e) {
          const file = e.target.files[0];
          const fileGroup = this.closest(".form-group");
          const small = fileGroup.querySelector("small");

          if (file) {
            // Check file type
            if (!file.name.match(/\.(pptx|potx)$/i)) {
              this.classList.add("error");
              small.textContent = "❌ Please select a .pptx or .potx file";
              small.style.color = "#dc3545";
              return;
            }

            // Check file size (10MB = 10 * 1024 * 1024 bytes)
            if (file.size > 10 * 1024 * 1024) {
              this.classList.add("error");
              small.textContent = "❌ File size must be less than 10MB";
              small.style.color = "#dc3545";
              return;
            }

            // File is valid
            this.classList.remove("error");
            const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
            small.textContent = `✅ ${file.name} (${sizeInMB} MB) - Ready to upload`;
            small.style.color = "#28a745";
          } else {
            // No file selected
            this.classList.remove("error");
            small.textContent =
              "Upload a .pptx or .potx template file (max 10MB)";
            small.style.color = "#666";
          }
        });

      // Character counter for text content
      document
        .getElementById("text_content")
        .addEventListener("input", function () {
          const textGroup = this.closest(".form-group");
          let small = textGroup.querySelector(".char-counter");

          if (!small) {
            small = document.createElement("small");
            small.className = "char-counter";
            textGroup.appendChild(small);
          }

          const charCount = this.value.length;
          const maxChars = 50000;

          if (charCount > maxChars) {
            this.classList.add("error");
            small.textContent = `❌ Text too long: ${charCount.toLocaleString()}/${maxChars.toLocaleString()} characters`;
            small.style.color = "#dc3545";
          } else {
            this.classList.remove("error");
            small.textContent = `📝 ${charCount.toLocaleString()}/${maxChars.toLocaleString()} characters`;
            small.style.color = charCount > maxChars * 0.8 ? "#f0ad4e" : "#666";
          }
        });

      // API key format detection and validation
      document.getElementById("api_key").addEventListener("input", function () {
        const apiGroup = this.closest(".form-group");
        let providerInfo = apiGroup.querySelector(".provider-info");

        if (!providerInfo) {
          providerInfo = document.createElement("small");
          providerInfo.className = "provider-info";
          apiGroup.appendChild(providerInfo);
        }

        const apiKey = this.value;

        if (apiKey.length > 5) {
          if (apiKey.startsWith("sk-proj-") || apiKey.startsWith("sk-")) {
            providerInfo.textContent = "🤖 OpenAI API key detected";
            providerInfo.style.color = "#007bff";
          } else if (apiKey.startsWith("sk-ant-")) {
            providerInfo.textContent = "🧠 Anthropic Claude API key detected";
            providerInfo.style.color = "#6c757d";
          } else if (apiKey.startsWith("AIza")) {
            providerInfo.textContent = "🔍 Google Gemini API key detected";
            providerInfo.style.color = "#dc3545";
          } else {
            providerInfo.textContent =
              "⚠️ Unknown API key format - will default to OpenAI";
            providerInfo.style.color = "#f0ad4e";
          }
        } else {
          providerInfo.textContent = "";
        }
      });
    </script>
  </body>
</html>
